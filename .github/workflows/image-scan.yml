name: Image scanner

on:
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest

        steps:
            - name: Login to Docker Hub
              uses: docker/login@v3
              with:
                username: ${{ vars. DOCKERHUB_USER }}
                password: ${{ secrets.DOCKER_TOKEN }}

            - name: Trivy scanner
              uses: aquasecurity/trivy-action@0.33.1
              with:
                severity: 'CRITICAL'
                exit-code: '1'

                